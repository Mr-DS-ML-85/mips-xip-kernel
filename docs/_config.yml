# Jekyll configuration for GitHub Pages
# This is a static site, but GitHub Pages may process it through Jekyll
# We use .nojekyll to bypass Jekyll processing since this is pure HTML/CSS/JS

title: "MIPS XIP Kernel Documentation"
description: "Execute-In-Place Linux kernel for memory-constrained embedded devices"
baseurl: ""
url: ""

# Build settings
markdown: kramdown
plugins: []

# Exclude files from processing
exclude:
  - "*.py"
  - "*.sh"
  - "*.patch"
  - Makefile
  - README.md
  - LICENSE
